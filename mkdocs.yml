site_name: CSDLC Docs
site_description: Claymore Software Development Lifecycle — Documentation
site_url: https://danhannah94.github.io/csdlc-docs/
repo_url: https://github.com/danhannah94/csdlc-docs
repo_name: danhannah94/csdlc-docs

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Methodology:
    - CSDLC Process: methodology/process.md
    - Core Values: methodology/core-values.md
    - Applying CSDLC: methodology/applying-csdlc.md
    - Lessons Learned: methodology/lessons-learned.md
    - Open Questions: methodology/open-questions.md
    - Workflow Template: methodology/workflow-template.md
    - Agent Base Template: methodology/agent-base-template.md
  - Projects:
    - Routr:
      - Overview: projects/routr/index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
  - attr_list
  - md_in_html

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/danhannah94
